server {
    server_name moviea.net www.moviea.net;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    # Frontend (Vite production build — same movierec app)
    location / {
        root /var/www/movierec/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # Static assets with long cache
    location /assets/ {
        root /var/www/movierec/frontend/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API reverse proxy to uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # Let's Encrypt challenge
    location ^~ /.well-known/acme-challenge/ { allow all; }

    # Block sensitive paths
    location ~ /\. { deny all; }
    location ~ ^/(data|tests|notebooks|scripts|venv) { deny all; }

    client_max_body_size 10M;

    access_log /var/log/nginx/moviea-access.log;
    error_log /var/log/nginx/moviea-error.log;

    listen [::]:80;
    listen 80;
}
