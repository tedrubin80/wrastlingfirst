# Ringside Analytics — portfolio static site at hookgen.online
#
# Replaces the previous nginx config that proxied hookgen.online to the
# Next.js wrestling app. From now on, the apex domain serves the static
# portfolio in /var/www/wrastling/docs/.
#
# The Express API (port 3001) and ML FastAPI (port 8002) are no longer
# exposed publicly via this domain — they remain accessible on localhost
# for any future internal use, and the live demo lives on HF Spaces.
#
# Deploy via: sudo ./scripts/deploy_portfolio_nginx.sh
#
# SSL is reused from the existing certbot cert at
# /etc/letsencrypt/live/hookgen.online/. Pre-existing.

server {
    server_name hookgen.online www.hookgen.online;

    root  /var/www/wrastling/docs;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    # Cache figures + PDF aggressively
    location ~* \.(png|jpg|jpeg|gif|svg|pdf|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Pretty URLs — try .html fallback (e.g. /paper -> /paper.html)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Block dotfiles
    location ~ /\. { deny all; }

    access_log /var/log/nginx/ringside-portfolio-access.log;
    error_log  /var/log/nginx/ringside-portfolio-error.log;

    # SSL — existing cert from earlier certbot run (don't re-issue, just reuse)
    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/hookgen.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hookgen.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP -> HTTPS redirect
server {
    if ($host = www.hookgen.online) { return 301 https://$host$request_uri; }
    if ($host = hookgen.online)     { return 301 https://$host$request_uri; }

    server_name hookgen.online www.hookgen.online;
    listen 80;
    listen [::]:80;
    return 404;
}
