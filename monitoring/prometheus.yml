global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "ringside-api"
    metrics_path: /api/metrics
    static_configs:
      - targets: ["api:3001"]
        labels:
          service: "api"

  - job_name: "ringside-ml"
    metrics_path: /health
    static_configs:
      - targets: ["ml-service:8000"]
        labels:
          service: "ml"
