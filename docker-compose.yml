version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ringside-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ringside
      POSTGRES_PASSWORD: ringside
      POSTGRES_DB: ringside
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ringside"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ringside-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  seed:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: ringside-seed
    command: python seed.py
    environment:
      DATABASE_URL: postgresql://ringside:ringside@db:5432/ringside
    volumes:
      - ./seed.py:/app/seed.py:ro
      - ./wrestlers_roster_2026.csv:/app/wrestlers_roster_2026.csv:ro
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - seed

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: ringside-scraper
    command: python -m scraper
    environment:
      DATABASE_URL: postgresql://ringside:ringside@db:5432/ringside
    volumes:
      - ./scraper:/app/scraper:ro
      - scraper-cache:/app/cache
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - scrape

  etl:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: ringside-etl
    command: python -m etl
    environment:
      DATABASE_URL: postgresql://ringside:ringside@db:5432/ringside
    volumes:
      - ./etl:/app/etl:ro
      - scraper-cache:/app/cache:ro
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - etl

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ringside-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://ringside:ringside@db:5432/ringside
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
      ML_SERVICE_URL: http://ml-service:8000
      PORT: "3001"
      NODE_ENV: development
    volumes:
      - ./api/src:/app/src:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ml-service:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: ringside-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ringside:ringside@db:5432/ringside
      REDIS_URL: redis://redis:6379
      ML_PORT: "8000"
    volumes:
      - ./ml/models:/app/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ml-train:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: ringside-ml-train
    command: python train.py
    environment:
      DATABASE_URL: postgresql://ringside:ringside@db:5432/ringside
    volumes:
      - ./ml/models:/app/models
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - train

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ringside-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  scraper-cache:
